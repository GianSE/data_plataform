name: Deploy Plataforma Completa (Windows)

on:
  push:
    branches:
      - main
    paths:
      - 'data_plataform/**'

jobs:
  deploy-production:
    # 1. Garante que roda no seu Windows com as tags certas
    runs-on: [self-hosted, windows, production]
    
    defaults:
      run:
        shell: powershell # Força uso do PowerShell

    steps:
      - name: ⬇️ Checkout Código
        uses: actions/checkout@v4
        with:
          clean: false # Mantém arquivos não versionados (como o .env)

      # NÃO PRECISA DO PASSO DE 'RSYNC/SYNC'. 
      # O actions/checkout já atualiza os arquivos na pasta do Runner.
      # Como usamos Docker com Volumes, ele já vai "ver" os arquivos novos automaticamente.

      - name: 🔍 Verificar Mudança na Infra (Docker)
        id: check_infra
        uses: dorny/paths-filter@v2
        with:
          filters: |
            requirements:
              - 'data_plataform/prefect-worker/requirements.txt'
              - 'data_plataform/prefect-worker/Dockerfile'
              - 'data_plataform/prefect-worker/docker-compose.yml'

      - name: 🐳 Rebuildar Worker (Se necessário)
        if: steps.check_infra.outputs.requirements == 'true'
        run: |
          Write-Host "⚠️ Dependências mudaram! Recriando container..."
          cd data_plataform/prefect-worker
          
          # Força recriação sem cache
          docker compose down
          docker compose up -d --build --force-recreate
          
          # Espera um pouco para garantir que o banco interno subiu
          Start-Sleep -Seconds 15

      - name: 🛡️ Validar Código Python (Safety Check)
        run: |
          Write-Host "🛡️ Validando integridade..."
          # CORREÇÃO: Caminho agora inclui 'pipelines' e nome do container é com underline (_)
          docker exec prefect_worker python /app/pipelines/_ops/check_imports.py

      - name: 🚀 Registrar Flows no Prefect
        if: success()
        run: |
          Write-Host "🚀 Atualizando Flows..."
          # CORREÇÃO: Caminho atualizado
          docker exec prefect_worker python /app/pipelines/_ops/deploy_all.py