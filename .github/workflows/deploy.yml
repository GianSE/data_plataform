name: Deploy Plataforma Completa

on:
  push:
    branches:
      - main
    paths:
      - 'data_plataform/**' # Monitora tudo dentro da pasta data_plataform

jobs:
  deploy-production:
    runs-on: self-hosted
    
    defaults:
      run:
        working-directory: /opt/drogamais/data_plataform # Define onde os comandos rodam no servidor

    steps:
      - name: Checkout Código (Baixar do Git)
        uses: actions/checkout@v3

      - name: 1. Sincronizar Arquivos no Servidor
        run: |
          # Copia tudo do Git para a pasta do servidor
          # O rsync é inteligente e só copia o que mudou
          rsync -av --delete --exclude='.git' ./ /opt/drogamais/data_plataform/

      - name: 2. Verificar Mudança em Dependências (Infra)
        id: check_infra
        uses: dorny/paths-filter@v2
        with:
          filters: |
            requirements:
              - 'prefect-worker/requirements.txt'
              - 'prefect-worker/Dockerfile'

      - name: 3. Rebuildar Worker (Só se dependencies mudaram)
        if: steps.check_infra.outputs.requirements == 'true'
        run: |
          echo "⚠️ Dependências mudaram! Recriando container..."
          docker compose -f prefect-worker/docker-compose.yml down
          docker compose -f prefect-worker/docker-compose.yml build --no-cache
          docker compose -f prefect-worker/docker-compose.yml up -d
          
          # Espera o worker subir antes de tentar registrar flows
          sleep 15

      - name: 4. Validar Código Python (Safety Check)
        run: |
          echo "🛡️ Validando integridade..."
          # Como sua pasta pipelines está mapeada no volume, o container já vê os arquivos novos
          docker exec prefect-worker python /app/_ops/check_imports.py

      - name: 5. Registrar Flows no Prefect
        if: success()
        run: |
          echo "🚀 Atualizando Flows..."
          docker exec prefect-worker python /app/_ops/deploy_all.py