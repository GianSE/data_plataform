name: CD - Deploy Automático em Produção (Main Only)

# Gatilhos específicos para a branch main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy em ${{ matrix.server }}
    runs-on: [self-hosted, Windows, "${{ matrix.server }}"]
    
    strategy:
      # Impede que o erro em um servidor cancele o deploy no outro
      fail-fast: false 
      matrix:
        server: [server-251, server-252]

    steps:
      - name: ⬇️ Checkout do Código
        uses: actions/checkout@v3

      - name: 🔐 Injetar Configurações (Secrets + IP Dinâmico)
        shell: powershell # Alterado de pwsh para powershell
        run: |
          # 1. Garante as pastas
          if (!(Test-Path "tasks_python/_settings")) {
              New-Item -ItemType Directory -Force -Path "tasks_python/_settings"
          }
          
          # 2. Injeta o .env principal (Secrets do GitHub)
          # Usando [System.IO.File]::WriteAllText para garantir o encoding correto sem BOM
          [System.IO.File]::WriteAllText("$PWD/tasks_python/_settings/.env", $env:SECRET_CONTENT)
          
          # 3. Captura o IP da máquina (Filtra pelo range 192.168.21.*)
          $IP = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -like "192.168.21.*" } | Select-Object -First 1).IPAddress
          
          if (-not $IP) { $IP = $env:COMPUTERNAME } # Fallback para hostname
          
          # 4. Cria o .env.worker com o IP
          $WorkerContent = "WORKER_NAME=worker-$IP"
          [System.IO.File]::WriteAllText("$PWD/_ops/prefect-worker/.env.worker", $WorkerContent)
          
          Write-Host "✅ Configuracoes injetadas para o worker-$IP"
        env:
          SECRET_CONTENT: ${{ secrets.ENV_MAIN_CONTENT }}

      - name: 🚀 Executar Deploy Runner(Self-Hosted Runners)
        # Trocado de 'pwsh' para 'powershell' para compatibilidade nativa com Windows
        shell: powershell 
        run: |
          Write-Host "Iniciando script de deploy local..."
          .\_ops\deploy_runner.ps1