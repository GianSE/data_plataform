name: CD - Deploy Automático em Produção

on:
  workflow_run:
    workflows: ["CI - Verificação de Qualidade (Sem Deploy)"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Só roda se o CI passou
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy em ${{ matrix.server }}
    runs-on: [self-hosted, Windows, "${{ matrix.server }}"]
    
    strategy:
      # Impede que o erro em um servidor cancele o deploy no outro
      fail-fast: false 
      matrix:
        server: [server-251, server-252]

    steps:
      - name: ⬇️ Checkout do Código
        uses: actions/checkout@v3

      - name: 🚀 Executar Deploy Runner(Self-Hosted Runners)
        # Trocado de 'pwsh' para 'powershell' para compatibilidade nativa com Windows
        shell: powershell 
        run: |
          Write-Host "Iniciando script de deploy local..."
          .\_ops\deploy_runner.ps1