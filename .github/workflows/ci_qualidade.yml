name: CI - Verificação de Qualidade (Sem Deploy)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [ main ]

jobs:
  testes-rapidos:
    # Opção A: Manter no GitHub mas com CACHE
    runs-on: ubuntu-latest 
    
    steps:
      - name: ⬇️ Baixar Código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip' # Cache ativo!
          cache-dependency-path: 'prefect-worker/requirements.txt'

      - name: 📦 Instalar Dependências (Com Cache)
        run: |
          python -m pip install --upgrade pip
          pip install -r prefect-worker/requirements.txt

      - name: 🕵️ Teste - Checagem de Imports
        run: python _ops/check_imports.py